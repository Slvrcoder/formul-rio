<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário ONG</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <form id="forms">

        <label for="nome">Nome</label>
        <input type="text" id="nome">
        <div id="erroNome" class="erro"></div>

        <label for="email">Email</label>
        <input type="text" id="email">
        <div id="erroEmail" class="erro"></div>

        <label for="telefone">Telefone</label>
        <input type="text" id="telefone">
        <div id="erroTelefone" class="erro"></div>

        <label for="CPF">CPF</label>
        <input type="text" id="CPF">
        <div id="erroCPF" class="erro"></div>

        <label for="idade">Idade</label>
        <input type="text" id="idade">
        <div id="erroIdade" class="erro"></div>

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade">
        <div id="erroCidade" class="erro"></div>

        <button type="submit">Enviar</button>

    </form>

    <div id="resultado" class="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
